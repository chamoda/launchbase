repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
        args:
          - --unsafe
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        args:
          - --fix
      - id: ruff-format
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.409
    hooks:
    - id: pyright
  - repo: local
    hooks:
      - id: requirements
        name: export requirements
        language: system
        files: uv.lock
        pass_filenames: False
        entry: uv export --no-dev --no-hashes -o requirements.txt
      - id: requirements-test
        name: export requirements-test
        language: system
        files: uv.lock
        pass_filenames: False
        entry: uv export --no-hashes -o requirements-test.txt
