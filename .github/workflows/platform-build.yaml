name: Platform Build

on:
  pull_request:
    paths:
      - "platform/**"
      - ".github/workflows/platform-build.yaml"
  push:
    branches: [main]
    paths:
      - "platform/**"
      - ".github/workflows/platform-build.yaml"

jobs:
  build:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: platform

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: platform/.nvmrc
          cache: npm
          cache-dependency-path: platform/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: platform/out/
          retention-days: 7
